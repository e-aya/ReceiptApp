# RailwayのDATABASE_URLを自動解析
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/receiptapp}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Vision API
google.vision.api-key=${VISION_API_KEY}

# ファイル保存（Railway の一時ストレージ）
storage.upload-dir=/tmp/uploads

# ポート（Railwayが自動設定）
server.port=${PORT:8080}
