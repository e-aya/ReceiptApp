# RailwayのDATABASE_URLを自動解析
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Railway proxy清掃員対策
## Railwayは接続数がそこまで多くないので控えめ
spring.datasource.hikari.maximum-pool-size=5
## 常に最低2接続を維持
spring.datasource.hikari.minimum-idle=2
## 10分使われない接続は掃除
spring.datasource.hikari.idle-timeout=600000
## 20分で接続を作り直す（★Railwayに殺される前に更新）
spring.datasource.hikari.max-lifetime=1200000
## 5分ごとに接続を軽く触って生存確認
spring.datasource.hikari.keepalive-time=300000
## 接続チェックのタイムアウト
spring.datasource.hikari.validation-timeout=5000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JVM
spring.threads.virtual.enabled=true

# Google Vision APIキー
google.vision.api-key=${VISION_API_KEY}

# Claude APIキー
claude.api-key=${CLAUDE_API_KEY}

# ファイル保存（Railway の一時ストレージ）
storage.upload-dir=/tmp/uploads

# ポート（Railwayが自動設定）
server.port=${PORT:8080}
